<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | S-Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap'); 
            body {
            font-family: 'Cairo', sans-serif !important;
             background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .profile-avatar { width: 100px; height: 100px; border: 4px solid #fff; font-size: 2.5rem; }
    </style>
</head>
<body>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-primary"><i class="fa-solid fa-user-tie me-2"></i> إعدادات الحساب</h3>
                    <a href="Dashboard.html" class="btn btn-outline-secondary rounded-pill px-3">
                        <i class="fa-solid fa-arrow-right me-1"></i> العودة
                    </a>
                </div>

                <div id="alertMessage" class="alert d-none shadow-sm border-0" role="alert"></div>

                <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <div class="profile-avatar bg-white text-primary rounded-circle d-flex justify-content-center align-items-center mx-auto shadow-sm" id="avatarLetter">
                            <i class="fa-solid fa-spinner fa-spin"></i>
                        </div>
                        <h4 class="mt-3 mb-0 fw-bold" id="displayName">جاري التحميل...</h4>
                        <p class="mb-0 text-white-50" id="displayRole">---</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="profileForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">الاسم الأول</label>
                                    <input type="text" class="form-control bg-light" id="firstName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">الاسم الثاني</label>
                                    <input type="text" class="form-control bg-light" id="secoundName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">رقم الهاتف</label>
                                    <input type="text" class="form-control bg-light" id="phone" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">العنوان</label>
                                    <input type="text" class="form-control bg-light" id="address" required>
                                </div>
                                <div class="col-md-6">
                                     <label class="form-label text-muted small fw-bold">كلمة المرور <span class="text-danger">*</span> (مطلوبة للحفظ)</label>
                                     <input type="password" class="form-control bg-light border-primary" id="password" placeholder="أدخل كلمة المرور الحالية أو الجديدة" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">البريد الإلكتروني (للقراءة فقط)</label>
                                    <input type="email" class="form-control" id="email" disabled readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">الرقم القومي (للقراءة فقط)</label>
                                    <input type="text" class="form-control" id="nationalId" disabled readonly>
                                </div>
                            </div>

                           
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="Js/apiService.js"></script>
    <script src="Js/Profile.js"></script>
</body>
</html>
