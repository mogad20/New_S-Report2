<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | S-Report</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden; /* عشان الخلفية متعملش سكرول */
        }

        /* ========================================= */
        /* 🎨 تعريف الألوان (المتغيرات) */
        /* ========================================= */
        :root {
            --main-color: #ff5722;
            --main-color-dark: #c62828;
            --glow-rgb: 255, 87, 34;
        }

        .theme-red {
            --main-color: #ff5722;
            --main-color-dark: #c62828;
            --glow-rgb: 255, 87, 34;
        }

        .theme-blue {
            --main-color: #00b0ff;
            --main-color-dark: #0091ea;
            --glow-rgb: 0, 176, 255;
        }

        .theme-green {
            --main-color: #00e676;
            --main-color-dark: #00c853;
            --glow-rgb: 0, 230, 118;
        }

        /* ========================================= */
        /* 1. الخلفية */
        /* ========================================= */
        .hero-section {
            background-color: #111;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-image 0.5s ease-in-out;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        /* ========================================= */
        /* 2. كارت الدخول */
        /* ========================================= */
        .login-glass-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 20, 0.70);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(var(--glow-rgb), 0.15);
            border-top: 1px solid rgba(var(--glow-rgb), 0.4);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 20px rgba(var(--glow-rgb), 0.1);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* ========================================= */
        /* 3. الحقول والأزرار */
        /* ========================================= */
        .input-group-text {
            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: none;
            color: var(--main-color);
            transition: all 0.3s ease;
        }

        .glass-input {
            background-color: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            color: white !important;
            height: 55px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background-color: rgba(0, 0, 0, 0.4) !important;
            border-color: var(--main-color);
            box-shadow: none;
            color: white;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--main-color);
            background-color: rgba(var(--glow-rgb), 0.1);
            color: #fff;
        }

        .btn-theme {
            background: linear-gradient(135deg, var(--main-color), var(--main-color-dark));
            padding: 14px;
            color: white;
            box-shadow: 0 4px 20px rgba(var(--glow-rgb), 0.4);
            border-radius: 12px;
            border: none;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-theme:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(var(--glow-rgb), 0.6);
            color: white;
        }

        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(var(--glow-rgb), 0.4));
            margin-bottom: 15px;
            transition: filter 0.3s;
            height: 110px;
            width: auto;
        }

        /* ========================================= */
        /* 🖌️ أزرار التحكم */
        /* ========================================= */
        .color-picker-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 15px;
        }

        .color-options {
            display: none;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .color-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover { transform: scale(1.2); border-color: white; }

        .toggle-colors-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .toggle-colors-btn:hover { transform: rotate(90deg); background: black; }
    </style>
</head>
<body>

    <div id="loginPageWrapper" class="hero-section theme-red">
        <div class="hero-overlay"></div>

        <div class="login-glass-card">
            <div class="text-center mb-5">
                <img src="assets/images/redLogo.png" id="dynamicLogo" alt="S-Report" class="logo-glow" onerror="this.src='https://via.placeholder.com/110x110.png?text=Logo'">
                <p class="text-white-50">نظام إدارة البلاغات الذكي</p>
            </div>

            <div id="errorMessage" class="alert alert-danger" style="display: none; font-size: 0.9rem;"></div>

            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label text-white">البريد الإلكتروني</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" class="form-control glass-input" placeholder="admin@example.com" dir="ltr" required />
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-white">كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock-open"></i></span>
                        <input type="password" id="password" class="form-control glass-input" placeholder="••••••••" dir="ltr" required />
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); cursor: pointer;">
                        <label class="form-check-label text-white-50 small me-2" for="rememberMe">تذكر دخولي</label>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-theme">
                    تسجيل الدخول <i class="fa-solid fa-arrow-left-long me-2"></i>
                </button>
            </form>

            <div class="text-center mt-5 pt-3 border-top border-light border-opacity-10">
                <small class="text-white-50" style="font-size: 0.75rem; opacity: 0.5;">Graduation Project 2026 &copy; All Rights Reserved</small>
            </div>
        </div>

        <div class="color-picker-container">
            <div class="color-options" id="colorOptions">
                <div class="color-btn" style="background: #ff0000;" onclick="changeTheme('theme-red')" title="أحمر"></div>
                <div class="color-btn" style="background: #008000;" onclick="changeTheme('theme-green')" title="أخضر"></div>
                <div class="color-btn" style="background: #0000ff;" onclick="changeTheme('theme-blue')" title="أزرق"></div>
            </div>
            <button class="toggle-colors-btn" onclick="toggleColorMenu()">
                <i class="fa-solid fa-palette fa-lg"></i>
            </button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.4/signalr.min.js"></script>
    <script src="Js/Layout.js"></script>
    <script src="Js/SignalRService.js"></script>
    <script src="Js/apiService.js"></script>
    <script src="Js/auth.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var savedTheme = localStorage.getItem('sreport-theme') || 'theme-red';
            changeTheme(savedTheme);
        });

        function toggleColorMenu() {
            var menu = document.getElementById('colorOptions');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'flex';
            }
        }

        function changeTheme(themeName) {
            var wrapper = document.getElementById('loginPageWrapper');
            var logoImg = document.getElementById('dynamicLogo');

            wrapper.classList.remove('theme-red', 'theme-blue', 'theme-green');
            wrapper.classList.add(themeName);

            // تأكد إن الصور موجودة في فولدر assets/images/
            if (themeName === 'theme-blue') {
                wrapper.style.backgroundImage = "url('assets/images/bgBlue.png')";
                logoImg.src = "assets/images/blueLogo.png";
            }
            else if (themeName === 'theme-green') {
                wrapper.style.backgroundImage = "url('assets/images/bgGreen.png')";
                logoImg.src = "assets/images/greenLogo.png";
            }
            else {
                wrapper.style.backgroundImage = "url('assets/images/bgRed.png')";
                logoImg.src = "assets/images/redLogo.png";
            }

            localStorage.setItem('sreport-theme', themeName);
            // في ملف الـ Login بتاعك
localStorage.setItem('ApiToken', token);
// بعد ما تخلص، وديه على الصفحة المركزية
window.location.href = 'Main.html';
        }
    </script>
</body>
</html>
