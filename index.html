<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | S-Report</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; }
        :root { --main-color: #ff5722; --main-color-dark: #c62828; --glow-rgb: 255, 87, 34; }
        .theme-red { --main-color: #ff5722; --main-color-dark: #c62828; --glow-rgb: 255, 87, 34; }
        .theme-blue { --main-color: #00b0ff; --main-color-dark: #0091ea; --glow-rgb: 0, 176, 255; }
        .theme-green { --main-color: #00e676; --main-color-dark: #00c853; --glow-rgb: 0, 230, 118; }
        
        .hero-section { background-color: #111; background-size: cover; background-position: center; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; display: flex; align-items: center; justify-content: center; transition: background-image 0.5s ease-in-out; }
        .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%); z-index: 1; }
        .login-glass-card { position: relative; z-index: 10; background: rgba(20, 20, 20, 0.70); backdrop-filter: blur(20px); border: 1px solid rgba(var(--glow-rgb), 0.15); padding: 3rem 2.5rem; border-radius: 24px; width: 100%; max-width: 420px; color: white; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6); }
        .glass-input { background-color: rgba(255, 255, 255, 0.07) !important; border: 1px solid rgba(255, 255, 255, 0.1); color: white !important; height: 55px; }
        .btn-theme { background: linear-gradient(135deg, var(--main-color), var(--main-color-dark)); padding: 14px; color: white; border-radius: 12px; border: none; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .logo-glow { height: 110px; width: auto; margin-bottom: 15px; }
        .color-picker-container { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; margin-bottom: 10px; }
        .toggle-colors-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 30, 30, 0.9); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginPageWrapper" class="hero-section theme-red">
        <div class="hero-overlay"></div>
        <div class="login-glass-card">
            <div class="text-center mb-5">
                <img src="assets/images/redLogo.png" id="dynamicLogo" alt="S-Report" class="logo-glow">
                <p class="text-white-50">نظام إدارة البلاغات الذكي</p>
            </div>
            
            <div id="errorMessage" class="alert alert-danger" style="display: none; font-size: 0.9rem;"></div>

            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label text-white">البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control glass-input" required />
                </div>
                <div class="mb-4">
                    <label class="form-label text-white">كلمة المرور</label>
                    <input type="password" id="password" class="form-control glass-input" required />
                </div>
                <button type="submit" id="loginBtn" class="btn-theme">تسجيل الدخول</button>
            </form>
        </div>
        
        <div class="color-picker-container">
            <div id="colorOptions" style="display:none; flex-direction: column;">
                <div class="color-btn" style="background: #ff0000;" onclick="changeTheme('theme-red')"></div>
                <div class="color-btn" style="background: #008000;" onclick="changeTheme('theme-green')"></div>
                <div class="color-btn" style="background: #0000ff;" onclick="changeTheme('theme-blue')"></div>
            </div>
            <button class="toggle-colors-btn" onclick="document.getElementById('colorOptions').style.display = (document.getElementById('colorOptions').style.display === 'flex' ? 'none' : 'flex')">
                <i class="fa-solid fa-palette"></i>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.4/signalr.min.js"></script>
    <script src="Js/Layout.js"></script>
    <script src="Js/SignalRService.js"></script>
    <script src="Js/apiService.js"></script>
    <script src="Js/Auth.js"></script>

    <script>
        // دالة تغيير الألوان بس، مفيش فيها أي منطق تسجيل دخول
        function changeTheme(themeName) {
            var wrapper = document.getElementById('loginPageWrapper');
            var logoImg = document.getElementById('dynamicLogo');
            wrapper.className = 'hero-section ' + themeName;
            if (themeName === 'theme-blue') { wrapper.style.backgroundImage = "url('assets/images/bgBlue.png')"; logoImg.src = "assets/images/blueLogo.png"; }
            else if (themeName === 'theme-green') { wrapper.style.backgroundImage = "url('assets/images/bgGreen.png')"; logoImg.src = "assets/images/greenLogo.png"; }
            else { wrapper.style.backgroundImage = "url('assets/images/bgRed.png')"; logoImg.src = "assets/images/redLogo.png"; }
            localStorage.setItem('sreport-theme', themeName);
        }

        document.addEventListener("DOMContentLoaded", function() {
            var savedTheme = localStorage.getItem('sreport-theme') || 'theme-red';
            changeTheme(savedTheme);
        });
    </script>
</body>
</html>
