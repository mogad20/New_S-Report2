<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>بث تحذير | S-Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css"> 
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap'); 
        body{ font-family: 'Cairo', sans-serif !important;}
    </style>
</head>

<body>
    <div id="layout-container"></div>
    <div class="container mt-5 pt-4">
        <h2 class="text-danger fw-bold mb-4">📢 بث تحذير للمدن</h2>
        <form id="warningForm" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">عنوان التحذير</label>
                <input type="text" id="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">محتوى الرسالة</label>
                <textarea id="body" class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">المدن المستهدفة</label>
                <select id="citySelect" class="form-control" multiple="multiple" required></select>
            </div>
            <button type="submit" class="btn btn-danger w-100">بث التحذير الآن</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Js/apiService.js"></script> 
    <script src="Js/Layout.js"></script> <script src="Js/CreateWarning.js"></script>
</body>
</html>
